<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KRUZZARENA Admin Panel</title>
    <link rel="stylesheet" href="app.css" />
    <link rel="stylesheet" href="app-premium.css" />
  </head>
  <body>
    <main class="app-shell admin-shell">
      <nav class="topbar admin-topbar">
        <div class="brand"><i class="brand-mark"></i>KRUZZ<span>ARENA</span> - Admin Panel</div>
        <div class="top-actions">
          <button id="addArenaBtn" class="button" type="button">+ Lapangan</button>
          <input type="file" id="excelFileInput" accept=".xlsx, .xls, .csv" style="display: none;" />
          <a class="button secondary" href="viewer.html" target="_blank">Lihat Live</a>
          <button id="logoutBtn" class="button secondary" type="button">Keluar</button>
        </div>
      </nav>

      <section class="admin-mini-header">
        <div class="viewer-logos" aria-label="Logo event">
          <img class="viewer-logo-img logo-square" src="medali.png" alt="Medali UNCHALL 2026" />
          <img class="viewer-logo-img" src="kruzzarena-panjang.png" alt="KRUZZARENA" />
          <img class="viewer-logo-img logo-square" src="logo-bandae.png" alt="Ultimate Bandae" />
        </div>
        <div class="admin-title-fields">
          <label class="field">
            <span>Nama Event</span>
            <input id="eventName" name="eventName" />
          </label>
          <label class="field">
            <span>Subjudul</span>
            <input id="subtitle" name="subtitle" />
          </label>
          <button id="saveAllBtn" class="button" type="button">Simpan Semua</button>
        </div>
      </section>

      <form id="adminForm">
        <section id="arenaEditors" class="operator-grid"></section>
      </form>

      <div id="arenaModal" class="modal" aria-hidden="true">
        <div class="modal-card">
          <header class="modal-head">
            <h2 id="modalTitle">Edit Lapangan</h2>
            <button id="closeModalBtn" class="icon-button" type="button">x</button>
          </header>

          <div class="modal-body">
            <label class="field">
              <span>Nama Lapangan</span>
              <input id="modalArenaName" />
            </label>

            <div class="admin-section">
              <h3>Warna Tema</h3>
              <div class="theme-options">
                <label class="theme-option red">
                  <input type="radio" name="modalArenaColor" value="red" />
                  <span>Merah</span>
                </label>
                <label class="theme-option blue">
                  <input type="radio" name="modalArenaColor" value="blue" />
                  <span>Biru</span>
                </label>
                <label class="theme-option green">
                  <input type="radio" name="modalArenaColor" value="green" />
                  <span>Hijau</span>
                </label>
              </div>
            </div>

            <label class="field">
              <span>Set Nomor Partai Aktif</span>
              <input id="modalArenaCurrent" inputmode="numeric" />
            </label>

            <div class="modal-setting-grid">
              <label class="field">
                <span>Jumlah Partai</span>
                <input id="modalArenaTotal" inputmode="numeric" />
              </label>
              <label class="field">
                <span>Masuk Area Pertandingan</span>
                <input id="modalArenaAreaCount" inputmode="numeric" />
              </label>
              <label class="field">
                <span>Masuk Ruang Tunggu</span>
                <input id="modalArenaWaitingCount" inputmode="numeric" />
              </label>
              <label class="field">
                <span>Mohon Bersiap</span>
                <input id="modalArenaReadyCount" inputmode="numeric" />
              </label>
            </div>
          </div>

          <footer class="modal-actions">
            <button id="deleteArenaBtn" class="button danger" type="button">Hapus</button>
            <button id="clearArenaBtn" class="button warning" type="button">Reset</button>
            <button id="cancelModalBtn" class="button secondary" type="button">Tutup</button>
            <button id="saveModalBtn" class="button" type="button">Simpan</button>
          </footer>
        </div>
      </div>

      <div id="toast" class="toast">Data berhasil disimpan ke viewer.</div>
    </main>



    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="config.js"></script>
    <script src="matches.js"></script>
    <script type="module">
      import { buildArenaView, defaultArenaSettings, loadState, makeArena, saveState } from "./state.js";

      if (sessionStorage.getItem("kruzzarena-admin") !== "true") {
        window.location.href = "index.html";
      }

      let currentState = await loadState();
      let activeArenaIndex = null;

      const eventName = document.querySelector("#eventName");
      const subtitle = document.querySelector("#subtitle");
      const editors = document.querySelector("#arenaEditors");
      const toast = document.querySelector("#toast");
      const modal = document.querySelector("#arenaModal");
      const modalTitle = document.querySelector("#modalTitle");
      const modalArenaName = document.querySelector("#modalArenaName");
      const modalArenaCurrent = document.querySelector("#modalArenaCurrent");
      const modalArenaTotal = document.querySelector("#modalArenaTotal");
      const modalArenaAreaCount = document.querySelector("#modalArenaAreaCount");
      const modalArenaWaitingCount = document.querySelector("#modalArenaWaitingCount");
      const modalArenaReadyCount = document.querySelector("#modalArenaReadyCount");
      const deleteArenaBtn = document.querySelector("#deleteArenaBtn");

      function numberValue(value, fallback, min, max) {
        const number = Math.round(Number(value));
        if (!Number.isFinite(number)) return fallback;
        return Math.min(Math.max(number, min), max);
      }

      function collectState() {
        return {
          ...currentState,
          eventName: eventName.value,
          subtitle: subtitle.value
        };
      }

      function getMatchTooltip(matchNumber, arenaIndex) {
        const arena = currentState?.arenas[arenaIndex];
        const matches = arena?.matches || window.KRUZZARENA_MATCHES || {};
        if (matchNumber) {
          const match = matches[String(matchNumber)];
          if (match) {
            return `Partai ${matchNumber}: ${match.athlete1 || '-'} VS ${match.athlete2 || '-'} (${match.matchClass || '-'})`;
          }
        }
        return `Partai ${matchNumber}`;
      }

      function renderBoxes(items, className, columns, arenaIndex) {
        return `<div class="operator-row ${columns} ${className}">${items.map((item) => {
          const tooltip = item ? getMatchTooltip(item, arenaIndex) : "";
          return `<div class="operator-box ${className} ${item ? "" : "empty"}" ${item ? `title="${tooltip}"` : ''}>${item || "-"}</div>`;
        }).join("")}</div>`;
      }

      function updateArenaDetailsFromDb(arena) {
        const matches = arena.matches || window.KRUZZARENA_MATCHES || {};
        if (arena.current) {
          const match = matches[String(arena.current)];
          if (match) {
            arena.athlete1 = match.athlete1 || "";
            arena.athlete2 = match.athlete2 || "";
            arena.matchClass = match.matchClass || "";
            arena.athlete1Photo = match.athlete1Photo || "";
            arena.athlete2Photo = match.athlete2Photo || "";
          } else {
            arena.athlete1 = "";
            arena.athlete2 = "";
            arena.matchClass = "";
            arena.athlete1Photo = "";
            arena.athlete2Photo = "";
          }
        }
      }

      function renderArenaCard(arenaData, arenaIndex) {
        const arena = buildArenaView(arenaData);

        return `
          <article class="operator-card ${arena.color}">
            <header class="operator-head">
              <h2>${arena.name}</h2>
              <p class="operator-total">Total Partai: <strong>${arena.totalMatches}</strong></p>
              <div class="operator-head-actions" style="position: absolute; right: 10px; top: 8px; display: flex; gap: 8px;">
                <button class="icon-button import-arena-excel-btn" style="position: static !important;" type="button" data-index="${arenaIndex}" title="Import Excel/CSV lapangan ini">📥</button>
                <button class="icon-button edit-arena-btn" style="position: static !important;" type="button" data-index="${arenaIndex}" title="Edit lapangan">⚙</button>
              </div>
            </header>

            <div class="operator-current">
              <span>Partai</span>
              <strong>${arena.current || "-"}</strong>
            </div>

            <div class="operator-athletes">
              <label class="field"><span>Kelas Pertandingan</span>
                <div class="custom-select-wrapper">
                  <input class="arena-class-input" type="text" data-index="${arenaIndex}" value="${arena.matchClass || ''}" placeholder="Ketik atau pilih kelas..." autocomplete="off" />
                  <div class="custom-select-options">
                    <div class="custom-select-option" data-value="Super Pra Cadet ABC Putera">Super Pra Cadet ABC Putera</div>
                    <div class="custom-select-option" data-value="Junior Putera">Junior Putera</div>
                    <div class="custom-select-option" data-value="Junior Puteri">Junior Puteri</div>
                    <div class="custom-select-option" data-value="Poomsae">Poomsae</div>
                    <div class="custom-select-option" data-value="Pra Cadet Puteri">Pra Cadet Puteri</div>
                    <div class="custom-select-option" data-value="Cadet Putera">Cadet Putera</div>
                    <div class="custom-select-option" data-value="Pra Cadet Putera">Pra Cadet Putera</div>
                    <div class="custom-select-option" data-value="Super Pra Cadet ABC Puteri">Super Pra Cadet ABC Puteri</div>
                    <div class="custom-select-option" data-value="Cadet Puteri">Cadet Puteri</div>
                  </div>
                </div>
              </label>
              <div class="athlete-inputs">
                <label class="field"><span>Sudut Merah (Nama)</span><input class="arena-athlete1-input" data-index="${arenaIndex}" value="${arena.athlete1 || ''}" placeholder="Nama Atlit 1" /></label>
                <span class="vs-text">VS</span>
                <label class="field"><span>Sudut Biru (Nama)</span><input class="arena-athlete2-input" data-index="${arenaIndex}" value="${arena.athlete2 || ''}" placeholder="Nama Atlit 2" /></label>
              </div>
            </div>

            <div class="operator-section">
              <h3>Masuk Area Pertandingan</h3>
              ${renderBoxes(arena.area, "area", "two", arenaIndex)}
            </div>

            <div class="operator-section">
              <h3>Ruang Tunggu</h3>
              ${renderBoxes(arena.waiting, "waiting", "auto", arenaIndex)}
            </div>

            <div class="operator-section">
              <h3>Mohon Bersiap</h3>
              ${renderBoxes(arena.ready, "ready", "auto", arenaIndex)}
            </div>

            <div class="operator-actions">
              <button class="button secondary compact back-arena-btn" type="button" data-index="${arenaIndex}">Back</button>
              <button class="button compact next-arena-btn" type="button" data-index="${arenaIndex}">Next</button>
            </div>
          </article>
        `;
      }

      function renderEditors(state) {
        eventName.value = state.eventName;
        subtitle.value = state.subtitle;
        editors.innerHTML = state.arenas.map(renderArenaCard).join("");

        document.querySelectorAll(".edit-arena-btn").forEach((button) => {
          button.addEventListener("click", () => openArenaModal(Number(button.dataset.index)));
        });
        document.querySelectorAll(".import-arena-excel-btn").forEach((button) => {
          button.addEventListener("click", () => {
            activeImportArenaIndex = Number(button.dataset.index);
            excelFileInput.click();
          });
        });
        document.querySelectorAll(".back-arena-btn").forEach((button) => {
          button.addEventListener("click", () => moveArena(Number(button.dataset.index), -1));
        });
        document.querySelectorAll(".next-arena-btn").forEach((button) => {
          button.addEventListener("click", () => moveArena(Number(button.dataset.index), 1));
        });
        
        document.querySelectorAll(".arena-class-input, .arena-athlete1-input, .arena-athlete2-input").forEach((input) => {
            input.addEventListener("change", async (e) => {
                const index = Number(e.target.dataset.index);
                const nextState = collectState();
                
                const card = e.target.closest('.operator-card');
                nextState.arenas[index] = {
                    ...nextState.arenas[index],
                    matchClass: card.querySelector('.arena-class-input').value,
                    athlete1: card.querySelector('.arena-athlete1-input').value,
                    athlete2: card.querySelector('.arena-athlete2-input').value
                };
                
                currentState = await saveState(nextState);
                showToast("Data atlit disimpan.");
            });
        });

        // Custom Select Logic
        document.querySelectorAll(".custom-select-wrapper").forEach((wrapper) => {
          const input = wrapper.querySelector(".arena-class-input");
          const optionsList = wrapper.querySelector(".custom-select-options");
          const options = wrapper.querySelectorAll(".custom-select-option");

          input.addEventListener("focus", () => {
            // Tutup semua select wrapper lain dulu
            document.querySelectorAll(".custom-select-wrapper").forEach(w => {
              if (w !== wrapper) w.classList.remove("open");
            });
            wrapper.classList.add("open");
          });

          // Menggunakan timeout agar click pada opsi terdaftar sebelum menu ditutup
          input.addEventListener("blur", () => {
            setTimeout(() => {
              wrapper.classList.remove("open");
            }, 200);
          });

          options.forEach(opt => {
            opt.addEventListener("click", async () => {
              input.value = opt.dataset.value;
              wrapper.classList.remove("open");
              
              // Memicu event change manual agar disimpan ke state/Firebase
              input.dispatchEvent(new Event("change"));
            });
          });
        });
      }

      async function moveArena(arenaIndex, direction) {
        const nextState = collectState();
        const arena = nextState.arenas[arenaIndex];
        const current = numberValue(arena.current, defaultArenaSettings.current, 1, arena.totalMatches);
        const nextCurrent = direction > 0
          ? Math.min(current + 1, arena.totalMatches)
          : Math.max(current - 1, 1);

        nextState.arenas[arenaIndex] = {
          ...arena,
          current: nextCurrent
        };

        updateArenaDetailsFromDb(nextState.arenas[arenaIndex]);

        currentState = await saveState(nextState);
        renderEditors(currentState);
        showToast(`${direction > 0 ? "NEXT" : "BACK"} ${currentState.arenas[arenaIndex].name} berhasil.`);
      }

      async function saveAndRender(message) {
        currentState = await saveState(collectState());
        renderEditors(currentState);
        showToast(message);
      }

      function showToast(message) {
        toast.textContent = message;
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 1800);
      }

      function openArenaModal(index) {
        activeArenaIndex = index;
        const arena = collectState().arenas[index];
        modalTitle.textContent = `Edit ${arena.name}`;
        modalArenaName.value = arena.name;
        modalArenaCurrent.value = arena.current;
        modalArenaTotal.value = arena.totalMatches;
        modalArenaAreaCount.value = arena.areaCount;
        modalArenaWaitingCount.value = arena.waitingCount;
        modalArenaReadyCount.value = arena.readyCount;
        document.querySelector(`input[name="modalArenaColor"][value="${arena.color}"]`).checked = true;
        deleteArenaBtn.disabled = currentState.arenas.length <= 1;
        modal.classList.add("show");
        modal.setAttribute("aria-hidden", "false");
      }

      function closeArenaModal() {
        modal.classList.remove("show");
        modal.setAttribute("aria-hidden", "true");
        activeArenaIndex = null;
      }

      document.querySelector("#saveAllBtn").addEventListener("click", () => saveAndRender("Judul event berhasil disimpan."));

      document.querySelector("#addArenaBtn").addEventListener("click", async () => {
        const baseState = collectState();
        const nextNumber = baseState.arenas.length + 1;
        const colors = ["red", "blue", "green"];
        const newArena = makeArena(`Lapangan ${String.fromCharCode(64 + nextNumber)}`, colors[(nextNumber - 1) % colors.length]);
        updateArenaDetailsFromDb(newArena);
        currentState = await saveState({
          ...baseState,
          arenas: [
            ...baseState.arenas,
            newArena
          ]
        });
        renderEditors(currentState);
        showToast("Lapangan baru ditambahkan.");
      });

      document.querySelector("#saveModalBtn").addEventListener("click", async () => {
        const nextState = collectState();
        const selectedColor = document.querySelector('input[name="modalArenaColor"]:checked').value;
        const totalMatches = numberValue(modalArenaTotal.value, defaultArenaSettings.totalMatches, 1, 999);
        const current = numberValue(modalArenaCurrent.value, defaultArenaSettings.current, 1, totalMatches);

        nextState.arenas[activeArenaIndex] = {
          ...nextState.arenas[activeArenaIndex],
          name: modalArenaName.value,
          color: selectedColor,
          current,
          totalMatches,
          areaCount: numberValue(modalArenaAreaCount.value, defaultArenaSettings.areaCount, 0, 20),
          waitingCount: numberValue(modalArenaWaitingCount.value, defaultArenaSettings.waitingCount, 0, 30),
          readyCount: numberValue(modalArenaReadyCount.value, defaultArenaSettings.readyCount, 0, 30)
        };

        updateArenaDetailsFromDb(nextState.arenas[activeArenaIndex]);

        currentState = await saveState(nextState);
        renderEditors(currentState);
        closeArenaModal();
        showToast("Pengaturan lapangan disimpan.");
      });

      document.querySelector("#clearArenaBtn").addEventListener("click", async () => {
  if (!confirm("Kosongkan semua angka pada lapangan ini?")) return;

  const nextState = collectState();

  nextState.arenas[activeArenaIndex] = {
    ...nextState.arenas[activeArenaIndex],
    current: "",
    totalMatches: 0
  };

  currentState = await saveState(nextState);
  renderEditors(currentState);
  closeArenaModal();
  showToast("Semua angka lapangan berhasil dikosongkan.");
});

      deleteArenaBtn.addEventListener("click", async () => {
        if (currentState.arenas.length <= 1) return;
        if (!confirm("Hapus lapangan ini dari dashboard?")) return;
        const nextState = collectState();
        nextState.arenas.splice(activeArenaIndex, 1);
        currentState = await saveState(nextState);
        renderEditors(currentState);
        closeArenaModal();
        showToast("Lapangan berhasil dihapus.");
      });

      document.querySelector("#closeModalBtn").addEventListener("click", closeArenaModal);
      document.querySelector("#cancelModalBtn").addEventListener("click", closeArenaModal);

      document.querySelector("#logoutBtn").addEventListener("click", () => {
        sessionStorage.removeItem("kruzzarena-admin");
        window.location.href = "index.html";
      });

      // Excel/CSV Import Logic
      let activeImportArenaIndex = null;
      const excelFileInput = document.querySelector("#excelFileInput");

      excelFileInput.addEventListener("change", (e) => {
        const file = e.target.files[0];
        if (!file || activeImportArenaIndex === null) return;

        const reader = new FileReader();
        reader.onload = async (evt) => {
          try {
            const data = evt.target.result;
            const workbook = XLSX.read(data, { type: 'binary' });
            const firstSheetName = workbook.SheetNames[0];
            const worksheet = workbook.Sheets[firstSheetName];
            const rows = XLSX.utils.sheet_to_json(worksheet, { header: 1 });

            if (!rows || rows.length < 2) {
              alert("File Excel kosong atau tidak memiliki baris data yang cukup.");
              return;
            }

            const headers = rows[0].map(h => String(h || "").toLowerCase().trim());
            
            let matchIdx = headers.findIndex(h => h.includes("partai") || h.includes("no") || h.includes("match"));
            let redIdx = headers.findIndex(h => h.includes("merah") || h.includes("red") || h.includes("athlete1") || h.includes("atlit1") || h.includes("atlit 1"));
            let blueIdx = headers.findIndex(h => h.includes("biru") || h.includes("blue") || h.includes("athlete2") || h.includes("atlit2") || h.includes("atlit 2"));
            let classIdx = headers.findIndex(h => h.includes("kelas") || h.includes("class") || h.includes("kategori") || h.includes("category"));
            let photoRedIdx = headers.findIndex(h => h.includes("foto merah") || h.includes("photo merah") || h.includes("foto red") || h.includes("photo red") || h.includes("foto 1") || h.includes("photo 1") || h.includes("foto1") || h.includes("photo1"));
            let photoBlueIdx = headers.findIndex(h => h.includes("foto biru") || h.includes("photo biru") || h.includes("foto blue") || h.includes("photo blue") || h.includes("foto 2") || h.includes("photo 2") || h.includes("foto2") || h.includes("photo2"));

            // Fallback jika header tidak cocok
            if (matchIdx === -1) matchIdx = 0;
            if (redIdx === -1) redIdx = 1;
            if (blueIdx === -1) blueIdx = 2;
            if (classIdx === -1) classIdx = 3;

            const importedMatches = {};
            let count = 0;

            for (let i = 1; i < rows.length; i++) {
              const row = rows[i];
              if (!row || row.length === 0) continue;

              const partaiNum = parseInt(row[matchIdx]);
              if (isNaN(partaiNum)) continue;

              importedMatches[String(partaiNum)] = {
                athlete1: String(row[redIdx] || "").trim(),
                athlete2: String(row[blueIdx] || "").trim(),
                matchClass: String(row[classIdx] || "").trim(),
                athlete1Photo: photoRedIdx !== -1 ? String(row[photoRedIdx] || "").trim() : "",
                athlete2Photo: photoBlueIdx !== -1 ? String(row[photoBlueIdx] || "").trim() : ""
              };
              count++;
            }

            if (count === 0) {
              alert("Tidak ada data partai valid yang berhasil dibaca. Pastikan kolom nomor partai berisi angka.");
              return;
            }

            // Simpan ke State pada arena aktif
            const nextState = collectState();
            const arena = nextState.arenas[activeImportArenaIndex];
            arena.matches = importedMatches;

            // Perbarui data atlet saat ini dari database yang diimpor
            if (arena.current) {
              const match = importedMatches[String(arena.current)];
              if (match) {
                arena.athlete1 = match.athlete1 || "";
                arena.athlete2 = match.athlete2 || "";
                arena.matchClass = match.matchClass || "";
                arena.athlete1Photo = match.athlete1Photo || "";
                arena.athlete2Photo = match.athlete2Photo || "";
              }
            }

            currentState = await saveState(nextState);
            renderEditors(currentState);
            showToast(`Berhasil mengimpor ${count} partai di ${arena.name}!`);
            excelFileInput.value = ""; // reset input
            activeImportArenaIndex = null;
          } catch (err) {
            console.error(err);
            alert("Gagal membaca file Excel. Pastikan format file benar.");
            activeImportArenaIndex = null;
          }
        };
        reader.readAsBinaryString(file);
      });

      renderEditors(currentState);
    </script>
  </body>
</html>
