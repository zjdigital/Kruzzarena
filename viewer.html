<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KRUZZARENA Live Match Dashboard</title>
    <link rel="stylesheet" href="app.css" />
    <link rel="stylesheet" href="app-premium.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="viewer-header">
        <div class="viewer-logos" aria-label="Logo event">
          <img class="viewer-logo-img" src="medali.png" alt="Medali UNCHALL 2026" />
          <img class="viewer-logo-img" src="kruzzarena-panjang.png" alt="KRUZZARENA" />
          <img class="viewer-logo-img" src="logo-bandae.png" alt="Ultimate Bandae" />
        </div>
        <h1 id="viewerTitle" class="viewer-title">KRUZZARENA LIVE MATCH DASHBOARD</h1>
        <p id="viewerSubtitle" class="viewer-subtitle">TAEKWONDO ULTIMATE BANDAE CHALLENGE</p>
      </section>

      <section id="viewerGrid" class="viewer-grid" aria-live="polite"></section>

      <footer class="viewer-footer">
        <span>Viewer Mode</span>
        <span id="clock">00.00.00</span>
      </footer>
      <button class="btn-fullscreen" onclick="document.documentElement.requestFullscreen()" title="Fullscreen">⛶</button>
    </main>

    <script src="config.js"></script>
    <script src="matches.js"></script>
    <script type="module">
      import { loadState, subscribeState, buildArenaView } from "./state.js";

      const grid = document.querySelector("#viewerGrid");
      const title = document.querySelector("#viewerTitle");
      const subtitle = document.querySelector("#viewerSubtitle");
      const clock = document.querySelector("#clock");
      let previousState = null;
      let audioCtx = null;
      let currentMatches = {};

      function playSound() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(880, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.15);
        gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.15);
      }

      function getPhotoUrl(name, customPhotoUrl) {
        if (customPhotoUrl && customPhotoUrl.trim() !== "") {
          return customPhotoUrl.trim();
        }
        if (!name || name.trim() === "" || name === "-") {
          return "";
        }
        const sanitized = name.toLowerCase().trim().replace(/[^a-z0-9]/g, "_");
        return `photos/${sanitized}.png`;
      }

      function getPhotoUrlJpg(name, customPhotoUrl) {
        if (customPhotoUrl && customPhotoUrl.trim() !== "") {
          return customPhotoUrl.trim();
        }
        if (!name || name.trim() === "" || name === "-") {
          return "";
        }
        const sanitized = name.toLowerCase().trim().replace(/[^a-z0-9]/g, "_");
        return `photos/${sanitized}.jpg`;
      }

      function getPhotoUrlJpeg(name, customPhotoUrl) {
        if (customPhotoUrl && customPhotoUrl.trim() !== "") {
          return customPhotoUrl.trim();
        }
        if (!name || name.trim() === "" || name === "-") {
          return "";
        }
        const sanitized = name.toLowerCase().trim().replace(/[^a-z0-9]/g, "_");
        return `photos/${sanitized}.jpeg`;
      }

      function getMatchTooltip(matchNumber, arenaIndex) {
        const arena = previousState?.arenas[arenaIndex];
        const matches = arena?.matches || currentMatches || window.KRUZZARENA_MATCHES || {};
        if (matchNumber) {
          const match = matches[String(matchNumber)];
          if (match) {
            return `Partai ${matchNumber}: ${match.athlete1 || '-'} VS ${match.athlete2 || '-'} (${match.matchClass || '-'})`;
          }
        }
        return `Partai ${matchNumber}`;
      }

      function renderBoxes(items, oldItems, className, columns, arenaIndex) {
        return `<div class="number-row ${columns}">${items.map((item, i) => {
          const isChanged = oldItems && oldItems[i] !== item;
          const tooltip = item ? getMatchTooltip(item, arenaIndex) : "";
          return `<div class="box-number ${className} ${item ? "" : "empty"} ${isChanged ? 'highlight' : ''}" ${item ? `title="${tooltip}"` : ''}>${item || "-"}</div>`;
        }).join("")}</div>`;
      }

      function renderArena(arenaData, oldArena, arenaIndex) {
        const arena = buildArenaView(arenaData);
        const old = oldArena ? buildArenaView(oldArena) : null;
        const currentChanged = old && old.current !== arena.current;

        return `
          <article class="match-card ${arena.color}">
            <header class="arena-head"><h2>${arena.name}</h2></header>
            <div class="current-match">
              <div class="match-info-top">
                <span class="current-label">Partai</span>
                <span class="current-number ${currentChanged ? 'highlight' : ''}">${arena.current || "-"}</span>
              </div>
              <div class="match-class" style="display: ${arena.matchClass ? 'inline-block' : 'none'}">${arena.matchClass || ""}</div>
              <div class="athletes-battle" style="display: ${arena.athlete1 || arena.athlete2 ? 'flex' : 'none'}">
                <div class="athlete red-corner">
                   <div class="photo-box">
                     <img src="${getPhotoUrl(arena.athlete1, arena.athlete1Photo)}" onerror="this.onerror=null; this.src='${getPhotoUrlJpg(arena.athlete1, arena.athlete1Photo)}'; this.onerror=() => { this.onerror=null; this.src='${getPhotoUrlJpeg(arena.athlete1, arena.athlete1Photo)}'; this.onerror=()=>this.style.opacity=0; };" onload="this.style.opacity=1;" />
                   </div>
                   <div class="athlete-name">${arena.athlete1 || "-"}</div>
                </div>
                <div class="vs-badge">VS</div>
                <div class="athlete blue-corner">
                   <div class="photo-box">
                     <img src="${getPhotoUrl(arena.athlete2, arena.athlete2Photo)}" onerror="this.onerror=null; this.src='${getPhotoUrlJpg(arena.athlete2, arena.athlete2Photo)}'; this.onerror=() => { this.onerror=null; this.src='${getPhotoUrlJpeg(arena.athlete2, arena.athlete2Photo)}'; this.onerror=()=>this.style.opacity=0; };" onload="this.style.opacity=1;" />
                   </div>
                   <div class="athlete-name">${arena.athlete2 || "-"}</div>
                </div>
              </div>
            </div>

            <h3 class="section-label">Masuk Area Pertandingan</h3>
            ${renderBoxes(arena.area, old?.area, "area", "cols-2", arenaIndex)}

            <h3 class="section-label">Ruang Tunggu</h3>
            ${renderBoxes(arena.waiting, old?.waiting, "waiting", "cols-5", arenaIndex)}

            <h3 class="section-label">Mohon Bersiap</h3>
            ${renderBoxes(arena.ready, old?.ready, "ready", "cols-5", arenaIndex)}
          </article>
        `;
      }

      function render(state) {
        title.textContent = state.eventName;
        subtitle.textContent = state.subtitle;
        currentMatches = state.matches || {};
        
        let shouldPlaySound = false;
        if (previousState) {
            state.arenas.forEach((arena, i) => {
                const old = previousState.arenas[i];
                if (old && old.current !== arena.current) {
                    shouldPlaySound = true;
                }
            });
        }
        
        if (shouldPlaySound) playSound();
        grid.innerHTML = state.arenas.map((a, i) => renderArena(a, previousState?.arenas[i], i)).join("");
        previousState = state;
      }

      function tick() {
        const now = new Date();
        clock.textContent = now.toLocaleTimeString("id-ID", { hour12: false }).replaceAll(":", ".");
      }

      document.body.addEventListener('click', () => {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
      }, { once: true });

      render(await loadState());
      await subscribeState(render);
      tick();
      setInterval(tick, 1000);
    </script>
    <script>
      function setMobileLandscapeMode() {
        const isLandscape = window.innerWidth > window.innerHeight;
        const isMobileWidth = window.innerWidth <= 1200;
        document.body.classList.toggle(
          "mobile-landscape-viewer",
          isLandscape && isMobileWidth
        );
      }

      setMobileLandscapeMode();
      window.addEventListener("resize", setMobileLandscapeMode);
      window.addEventListener("orientationchange", function () {
        setTimeout(setMobileLandscapeMode, 300);
      });
    </script>
  </body>
</html>
